version: "3.8"

services:
  pyspark:
    image: pyspark-app:latest   # your custom image
    container_name: pyspark-container
    command: bash               # gives you interactive shell
    ports:
      - "4040:4040"             # Spark UI
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./spark-events:/spark-events
    working_dir: /app
    stdin_open: true
    tty: true

  history-server:
    image: pyspark-app:latest   # must match Spark version
    container_name: spark-history
    command: >
      bash -c "mkdir -p /spark-events &&
               ./bin/spark-class org.apache.spark.deploy.history.HistoryServer"
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/spark-events
    ports:
      - "18080:18080"
    volumes:
      - ./spark-events:/spark-events
